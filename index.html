<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESI - Elevador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <h1>SESI Elevador</h1>

        <div class="painel">

            <h2>Carga Atual</h2>

            <p id="peso">0 kg</p>

            <div id="alerta" class="alerta">
                SOBRECARGA
            </div>

            <div class="botoes">
                <button id="adicionarBtn">
                    Adicionar 100kg
                </button>

                <button id="retirarBtn">
                    Retirar 100kg
                </button>

                <button id="resetarBtn">
                    Resetar
                </button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
